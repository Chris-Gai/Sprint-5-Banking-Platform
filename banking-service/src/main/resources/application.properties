server.port=8080

spring.datasource.url=jdbc:mysql://banking-db:3306/bankdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=bankuser
spring.datasource.password=bankpass

spring.jpa.hibernate.ddl-auto=validate

# auth-service's JWKS endpoint - resolved by Docker's internal DNS
app.auth.jwks-uri=http://auth-service:8081/.well-known/jwks.json

management.endpoints.web.exposure.include=health
