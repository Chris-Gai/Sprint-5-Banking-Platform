server.port=8081

spring.datasource.url=jdbc:mysql://auth-db:3306/authdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=authuser
spring.datasource.password=authpass

# Flyway owns the schema; JPA only checks entities match it
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

app.jwt.expiration-ms=3600000
app.jwt.key-id=auth-key-1

management.endpoints.web.exposure.include=health
